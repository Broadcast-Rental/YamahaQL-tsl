services:
  yamaha-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yamaha-web
    restart: unless-stopped
    ports:
      - "5000:5000"  # Web interface port
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 5000)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  yamaha-swp08-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yamaha-swp08-bridge
    restart: unless-stopped
    command: ["python", "yamaha_to_swp08_bridge.py", "--yamaha-ip", "172.20.40.13", "--swp08-port", "2000", "--poll-interval", "0.5"]
    ports:
      - "2001:2000"  # Host port 2001 -> container 2000 (SW-P-08)
    environment:
      - PYTHONUNBUFFERED=1
